name: Build EXE

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Kodu çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Gereksinimleri kur
        run: |
          pip install pyinstaller
          pip install customtkinter

      - name: EXE oluştur
        run: pyinstaller --onefile --windowed --hidden-import=customtkinter --add-data "su_takip_data.json;." fixing.py

      - name: EXE yükle
        uses: actions/upload-artifact@v4
        with:
          name: exe-file
          path: dist/*.exe
